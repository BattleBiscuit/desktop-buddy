name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            spec: Russgeist.spec
            artifact: Russgeist-windows
            python_cmd: python
          - os: ubuntu-latest
            spec: Russgeist-linux.spec
            artifact: Russgeist-linux
            python_cmd: python
          # Both macOS builds run on the same (plentiful) Apple Silicon
          # runner pool rather than the scarce real-Intel-hardware macos-13
          # pool, which can queue for a long time. The x64 leg cross-builds
          # by running the x86_64 slice of the runner's pre-installed
          # universal2 python.org framework build (via `arch -x86_64`)
          # under Rosetta 2, instead of using actions/setup-python - its
          # `architecture` input didn't reliably produce a genuine x86_64
          # PyInstaller bootloader, since that's a separately-compiled
          # native binary bundled with the pyinstaller wheel.
          - os: macos-14
            spec: Russgeist-macos.spec
            artifact: Russgeist-macos-intel
            python_cmd: arch -x86_64 /usr/local/bin/python3.12
            rosetta: true
          - os: macos-14
            spec: Russgeist-macos.spec
            artifact: Russgeist-macos-arm64
            python_cmd: python

    runs-on: ${{ matrix.os }}

    # Only affects macOS: if pip can't find a prebuilt wheel matching our
    # unusual interpreter (the system framework Python's x86_64 slice under
    # Rosetta) and falls back to compiling PyInstaller's bootloader from
    # source, this pins the minimum supported macOS version instead of
    # defaulting to the runner's own (much newer) SDK baseline - avoids
    # baking in compiler assumptions that don't hold on an older real Mac.
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.13"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: matrix.rosetta != true
        with:
          python-version: "3.12"

      - name: Install Rosetta (for the x64 cross-build on Apple Silicon)
        if: matrix.rosetta == true
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Install system tray dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk libgirepository1.0-dev gir1.2-appindicator3-0.1

      - name: Install Python dependencies
        shell: bash
        run: ${{ matrix.python_cmd }} -m pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Build
        shell: bash
        run: ${{ matrix.python_cmd }} -m PyInstaller ${{ matrix.spec }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release binaries
        run: |
          mkdir -p release
          mv artifacts/Russgeist-windows/Russgeist.exe release/Russgeist-windows.exe
          mv artifacts/Russgeist-linux/Russgeist release/Russgeist-linux

          # macOS binaries ship zipped with run-macos.command, which strips
          # the Gatekeeper quarantine flag (unsigned builds get blocked
          # otherwise) and launches the app - double-click it after unzipping.
          for variant in intel arm64; do
            dir="artifacts/Russgeist-macos-$variant"
            cp run-macos.command "$dir/"
            chmod +x "$dir/Russgeist" "$dir/run-macos.command"
            (cd "$dir" && zip -j "$OLDPWD/release/Russgeist-macos-$variant.zip" Russgeist run-macos.command)
          done

      # Rolling release: force the "latest" tag onto this commit so every
      # push to master replaces the previous build rather than piling up a
      # new tag/release per commit.
      - name: Move the latest tag
        run: |
          git tag -f latest
          git push origin latest --force

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          body: Automatically built from the latest push to master. Not a stable/versioned release.
          files: release/*
